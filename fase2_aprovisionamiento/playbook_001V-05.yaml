---
- name: Aprovisionamiento CSR1kv - Operadora Logistica SA
  hosts: routers
  gather_facts: no
  vars_files:
    - ../vars/vars_001V-05.yaml
  tasks:
    - name: E8 - Respaldar configuracion actual
      ios_command:
        commands: show running-config
      register: backup_output
    - name: E8 - Guardar respaldo en archivo
      copy:
        content: "{{ backup_output.stdout[0] }}"
        dest: "{{ playbook_dir }}/respaldo/backup_001V-05.cfg"
        force: no
      delegate_to: localhost
    - name: E7b - Habilitar NETCONF
      ios_config:
        lines:
          - netconf-yang
    - name: E7b - Habilitar RESTCONF
      ios_config:
        lines:
          - restconf
    - name: E7b - Habilitar servidor HTTP seguro
      ios_config:
        lines:
          - ip http secure-server
    - name: E7c - Configurar hostname corporativo
      ios_config:
        lines:
          - "hostname {{ cliente.hostname }}"
    - name: E7c - Configurar banner de acceso
      ios_config:
        lines:
          - "banner motd ^C{{ router.banner }}^C"
    - name: E7c - Configurar servidor NTP
      ios_config:
        lines:
          - "ntp server {{ router.ntp_server }}"
    - name: E7c - Configurar descripcion interfaz GigabitEthernet1
      ios_config:
        lines:
          - "description {{ router.descripcion_wan }}"
        parents: interface GigabitEthernet1
    - name: E7c - Crear interfaz Loopback con IP de gestion
      ios_config:
        lines:
          - "ip address {{ router.loopback_ip }} {{ router.loopback_mask }}"
        parents: "interface Loopback{{ router.loopback_id }}"
